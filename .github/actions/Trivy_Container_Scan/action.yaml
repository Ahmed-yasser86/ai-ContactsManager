# ==============================================================================
# Action Name: Trivy Container Scan with GitHub Code Scanning
# Description: Scans Docker images, outputs SARIF data, and uploads it to 
#              GitHub Security tab to show alerts directly inside PR lines.
# ==============================================================================

name: 'Trivy Container Scan'
description: 'Scans Docker images and integrates with GitHub Security Alerts'

inputs:
  image_tag:
    description: 'The tag of the local Docker image to scan'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Run Trivy Scanner (SARIF Output)
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        scan-type: 'image'
        image-ref: ${{ inputs.image_tag }}
        format: 'sarif'
        output: 'trivy-results.sarif'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: Upload Trivy Scan Results to GitHub Security
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'