name: 'SonarCloud .NET Scan'
description: 'Runs SonarCloud analysis for .NET projects during the build lifecycle with caching'
inputs:
  sonar_token:
    description: 'The SONAR_TOKEN secret'
    required: true
  project_key:
    description: 'The SonarCloud project key'
    required: true
  organization:
    description: 'The SonarCloud organization key'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Cache SonarCloud packages
      uses: actions/cache@v4
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-sonar-

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('ContactsManager.UI/**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Install SonarScanner and Coverage Tools (with Cache Check)
      shell: bash
      run: |
          if ! dotnet tool list --global | grep -q "dotnet-sonarscanner"; then
            echo "Installing dotnet-sonarscanner..."
            dotnet tool install --global dotnet-sonarscanner
          fi

          if ! dotnet tool list --global | grep -q "dotnet-coverage"; then
            echo "Installing dotnet-coverage..."
            dotnet tool install --global dotnet-coverage
          fi

    - name: Sonar Scanner Begin
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          dotnet sonarscanner begin \
            /k:"${{ inputs.project_key }}" \
            /o:"${{ inputs.organization }}" \
            /d:sonar.token="${{ inputs.sonar_token }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.qualitygate.wait=true
        else
          dotnet sonarscanner begin \
            /k:"${{ inputs.project_key }}" \
            /o:"${{ inputs.organization }}" \
            /d:sonar.token="${{ inputs.sonar_token }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.qualitygate.wait=true \
            /d:sonar.branch.name="${{ github.ref_name }}"
        fi

    - name: Build Project (Required for Sonar to analyze)
      shell: bash
      run: dotnet build ContactsManager.UI --no-restore

    - name: Run Tests with Coverage
      shell: bash
      run: dotnet-coverage collect 'dotnet test ContactsManager.UI --no-restore' -f xml -o 'coverage.xml'

    - name: Sonar Scanner End
      shell: bash
      run: dotnet sonarscanner end /d:sonar.token="${{ inputs.sonar_token }}"