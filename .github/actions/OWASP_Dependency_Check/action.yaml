name: 'OWASP Dependency-Check Scan'
description: 'Runs OWASP Dependency-Check tool for .NET projects with data caching'

inputs:
  project_name:
    description: 'Name of the project for the report'
    required: false
    default: 'ContactsManager'

runs:
  using: 'composite'
  steps:
    - name: Cache Dependency Check Data
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/dependency-check-data
        key: ${{ runner.os }}-depcheck-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-depcheck-

    - name: Depcheck Scan
      uses: dependency-check/Dependency-Check_Action@main
      id: Depcheck
      with:
        project: ${{ inputs.project_name }}
        path: '.'
        format: 'HTML'
        out: 'dependency-check-reports'
        args: >
          --failOnCVSS 7
          --data "${{ github.workspace }}/dependency-check-data"
          --scan "ContactsManager.UI/**/*.csproj"
          --scan "**/project.assets.json"

    - name: Upload Dependency Check results
      uses: actions/upload-artifact@v4
      with:
         name: Dependency-Check-Report
         path: dependency-check-reports
         retention-days: 7


