# ==============================================================================
# Action Name: OWASP Dependency-Check Scan
# Description: This composite action runs OWASP Dependency-Check to scan .NET 
#              projects. It generates both HTML reports (for local review) and 
#              SARIF reports (to be uploaded to GitHub Code Scanning).
# Arguments:
#   - --failOnCVSS 7: Fails the build if a vulnerability score is 7.0 or higher.
#   - --scan: Targets specific .csproj files and project.assets.json files.
# ==============================================================================

name: 'OWASP Dependency-Check Scan'
description: 'Runs OWASP Dependency-Check tool for .NET projects using the built-in database'

inputs:
  project_name:
    description: 'Name of the project for the report'
    required: false
    default: 'ContactsManager'

runs:
  using: 'composite'
  steps:
    - name: Depcheck Scan
      uses: dependency-check/Dependency-Check_Action@main
      id: Depcheck
      with:
        project: ${{ inputs.project_name }}
        path: '.'
        format: 'HTML, SARIF' 
        out: 'dependency-check-reports'
        args: >
          --failOnCVSS 7
          --scan "ContactsManager.UI/**/*.csproj"
          --scan "**/project.assets.json"

    - name: Upload Dependency Check results
      uses: actions/upload-artifact@v4
      if: always()
      with:
         name: Dependency-Check-Report
         path: dependency-check-reports
         retention-days: 7

