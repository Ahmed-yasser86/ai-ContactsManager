name: 'Setup .NET and Restore Dependencies'
description: 'Installs the .NET SDK via global.json with caching and restores dependencies.'
inputs:
  restore:
    description: 'Whether to run the standard dotnet restore'
    required: false
    default: 'true'
runs:
  using: 'composite'
  steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@v4  
      with:
        global-json-file: ContactsManager.UI/global.json 
        cache: true
        cache-dependency-path: 'ContactsManager.UI/**/packages.lock.json'
    - name: Restore dependencies
      if: ${{ inputs.restore == 'true' }}
      shell: bash
      run: dotnet restore --locked-mode --disable-build-servers -p:UseMultiToolProvider=false
      working-directory: ContactsManager.UI