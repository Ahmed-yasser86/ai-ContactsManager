name: CI

on:
  workflow_dispatch:  
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]
    types:
      - opened
      - edited
      - review_requested
      - synchronize
      - reopened    







jobs:
  lint:
    name: Lint Code base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Setup and Restore
        uses: ./.github/actions/CacheDependencies

      - name: Run linters
        uses: wearerequired/lint-action@v2.3.0
        with:
          github_token: ${{ github.token }}
          dotnet_format: true
          dotnet_format_args: "ContactsManager.UI"
          neutral_check_on_warning: true

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Setup and Restore
        uses: ./.github/actions/CacheDependencies

      - name: Build
        run: dotnet build --no-restore
        working-directory: ContactsManager.UI



        
  sonar:
    
    env:
     GITHUB_TOKEN: ${{ github.token }}
     Serilog__WriteTo__2__Args__connectionString: ${{ secrets.SERILOG_DB_CONNECTION }}
     ConnectionStrings__ContactDb: ${{ secrets.DB_CONNECTION_STRING }}
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [build,test]
    permissions:
      contents: read
      pull-requests: write  
      checks: write
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup and Restore
        uses: ./.github/actions/CacheDependencies

      - name: Run SonarCloud Scan
        uses: ./.github/actions/SonarCloud/SonarScane
        with:
          sonar_token: ${{ secrets.SONAR_TOKEN }}
          project_key: ${{ secrets.SONAR_PROJECT_KEY }}
          organization: ${{ secrets.SONAR_ORGANIZATION }}



  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build 
    permissions:
      contents: read
    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
      ConnectionStrings__ContactDb: ${{ secrets.DB_CONNECTION_STRING }}
      Serilog__WriteTo__2__Args__connectionString: ${{ secrets.SERILOG_DB_CONNECTION }}
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Setup and Restore
        uses: ./.github/actions/CacheDependencies

      - name: Run Specified Unit and Integration Tests
        run: |
          dotnet test Tests/ContactsManger.ServiceTests.csproj --configuration Release --no-restore --logger "trx;LogFileName=ServiceTests.trx" --results-directory ./TestResults
          dotnet test ContactsManager.ControllersTest/ContactsManager.ControllersTest.csproj --configuration Release --no-restore --logger "trx;LogFileName=ControllersTest.trx" --results-directory ./TestResults
          dotnet test ContactsManager.IntegrationTests/ContactsManager.IntegrationTests.csproj --configuration Release --no-restore --logger "trx;LogFileName=IntegrationTests.trx" --results-directory ./TestResults

      - name: Upload all test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: All-Test-Results
          path: TestResults/
          retention-days: 7

  apply-migrations:
    name: Apply Database Migrations
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    env:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__ContactDb: ${{ secrets.DB_CONNECTION_STRING }}
      Serilog__WriteTo__2__Args__connectionString: ${{ secrets.SERILOG_DB_CONNECTION }}
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Setup and Restore
        uses: ./.github/actions/CacheDependencies
        with:
          restore: 'false'

      - name: Restore Infrastructure Project
        run: dotnet restore ContactsManager.Inferastructure/ContactsManager.Inferastructure.csproj

      - name: Restore UI Project
        run: dotnet restore ContactsManager.UI/ContactsManager.UI.csproj

      - name: Install EF Core CLI Tool
        run: dotnet tool install --global dotnet-ef

      - name: Migrate ContactDb
        run: |
          dotnet ef database update \
            --project ContactsManager.Inferastructure/ContactsManager.Inferastructure.csproj \
            --startup-project ContactsManager.UI/ContactsManager.UI.csproj \
            --context AppDBContext

  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      actions: write
    steps:
      - name: Check Out Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./ContactsManager.UI/Dockerfile
          push: false
          tags: contacts-manager-ui:${{ github.sha }}
          build-args: |
            ConnectionStrings__ContactDb=${{ secrets.DB_CONNECTION_STRING }}
            Serilog__WriteTo__2__Args__connectionString=${{ secrets.SERILOG_DB_CONNECTION }}