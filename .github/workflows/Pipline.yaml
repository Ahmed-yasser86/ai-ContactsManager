name: CI

on:
  workflow_dispatch:  
  push:
    branches: [master, dev,feature/ci-v2]
  pull_request:
    branches: [master]
    types:
      - opened
      - edited
      - review_requested
      - synchronize
      - reopened    



env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint Code base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Setup and Restore
        uses: ./.github/actions/CacheDependencies

      - name: Run linters
        uses: wearerequired/lint-action@v2.3.0
        with:
          github_token: ${{ github.token }}
          dotnet_format: true
          dotnet_format_args: "ContactsManager.UI"
          neutral_check_on_warning: true

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Setup and Restore
        uses: ./.github/actions/CacheDependencies

      - name: Build
        run: dotnet build --no-restore
        working-directory: ContactsManager.UI

  secret_scan:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Run Gitleaks Secret Scan
        uses: ./.github/actions/SecretScan

  security_scan:
    name: Security Vulnerability Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Setup and Restore
        uses: ./.github/actions/CacheDependencies

      - name: Run OWASP Dependency Check
        uses: ./.github/actions/OWASP_Dependency_Check
        with:
          project_name: 'ContactsManager'

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [build, test]
    env:
      GITHUB_TOKEN: ${{ github.token }}
      Serilog__WriteTo__2__Args__connectionString: ${{ secrets.SERILOG_DB_CONNECTION }}
      ConnectionStrings__ContactDb: ${{ secrets.DB_CONNECTION_STRING }}
    permissions:
      contents: read
      pull-requests: write  
      checks: write
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup and Restore
        uses: ./.github/actions/CacheDependencies

      - name: Run SonarCloud Scan
        uses: ./.github/actions/SonarCloud/SonarScane
        with:
          sonar_token: ${{ secrets.SONAR_TOKEN }}
          project_key: ${{ secrets.SONAR_PROJECT_KEY }}
          organization: ${{ secrets.SONAR_ORGANIZATION }}

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build 
    permissions:
      contents: read
    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
      ConnectionStrings__ContactDb: ${{ secrets.DB_CONNECTION_STRING }}
      Serilog__WriteTo__2__Args__connectionString: ${{ secrets.SERILOG_DB_CONNECTION }}
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Setup and Restore
        uses: ./.github/actions/CacheDependencies

      - name: Run Specified Unit and Integration Tests
        run: |
          dotnet test Tests/ContactsManger.ServiceTests.csproj --configuration Release --no-restore --logger "trx;LogFileName=ServiceTests.trx" --results-directory ./TestResults
          dotnet test ContactsManager.ControllersTest/ContactsManager.ControllersTest.csproj --configuration Release --no-restore --logger "trx;LogFileName=ControllersTest.trx" --results-directory ./TestResults
          dotnet test ContactsManager.IntegrationTests/ContactsManager.IntegrationTests.csproj --configuration Release --no-restore --logger "trx;LogFileName=IntegrationTests.trx" --results-directory ./TestResults

      - name: Upload all test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: All-Test-Results
          path: TestResults/
          retention-days: 7

  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      actions: write
    steps:
      - name: Check Out Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c887d9748da14dcb42b11cf8bcc773b301ea55b5

      - name: Build Docker Image
        uses: docker/build-push-action@ff26911fd365b0233252dfbd8eede1c0e9ef9a51
        with:
          context: .
          file: ./ContactsManager.UI/Dockerfile
          push: false
          load: true
          cache-to: type=gha,mode=max
          cache-from: type=gha
          tags: contacts-manager-ui:${{ github.sha }}
          build-args: |
            ConnectionStrings__ContactDb=${{ secrets.DB_CONNECTION_STRING }}
            Serilog__WriteTo__2__Args__connectionString=${{ secrets.SERILOG_DB_CONNECTION }}

  trivy_container_scan:
    name: Trivy Container Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build-image
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c887d9748da14dcb42b11cf8bcc773b301ea55b5  

      - name: Build and Load Image Locally
        uses: docker/build-push-action@ff26911fd365b0233252dfbd8eede1c0e9ef9a51  
        with:
          context: . 
          file: ./ContactsManager.UI/Dockerfile 
          push: false
          load: true 
          tags: contacts-manager-ui:${{ github.sha }}
          cache-from: type=gha  

      - name: Execute Trivy Scan via Composite Action
        uses: ./.github/actions/Trivy_Container_Scan
        with:
          image_tag: contacts-manager-ui:${{ github.sha }}

  publish-image:
    name: Publish Docker Image to GHCR
    runs-on: ubuntu-latest
    needs: [trivy_container_scan, sonar, secret_scan, security_scan]  
    if: >
      (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/feature/ci-v2') &&
      (github.event_name == 'push' || github.event_name == 'pull_request')
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c887d9748da14dcb42b11cf8bcc773b301ea55b5

      - name: Build and Push Docker Image
        id: push
        uses: docker/build-push-action@ff26911fd365b0233252dfbd8eede1c0e9ef9a51
        with:
          context: .
          file: ./ContactsManager.UI/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          build-args: |
            ConnectionStrings__ContactDb=${{ secrets.DB_CONNECTION_STRING }}
            Serilog__WriteTo__2__Args__connectionString=${{ secrets.SERILOG_DB_CONNECTION }}

      - name: Generate Artifact Attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true