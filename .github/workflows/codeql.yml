# ==============================================================================
# Workflow Name: CodeQL Advanced Security Analysis
# Description: Automatically scans the repository for code vulnerabilities, 
#              security flaws, and bugs using GitHub's CodeQL engine.
#              Tailored for .NET (C#) and GitHub Actions.
# ==============================================================================

name: "CodeQL Security Analysis"

on:
  push:
    branches: [ "master", "dev" ]
  pull_request:
    branches: [ "master" ]
    types: [ opened, synchronize, reopened ]

jobs:
  analyze:
    name: Analyze Code (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      packages: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: csharp
            build-mode: none
          - language: actions
            build-mode: none

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{ matrix.language }}"
